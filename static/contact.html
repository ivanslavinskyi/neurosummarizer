<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — NeuroSummarizer</title>
  <meta name="description" content="Get in touch with the NeuroSummarizer team. Questions, ideas, or bug reports welcome." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div class="wrap nav">
      <a href="/" class="brand">🧠 NeuroSummarizer</a>
      <nav aria-label="Primary">
        <button id="menuBtn" aria-label="Toggle menu">☰</button>
        <div id="links">
          <a href="/">Home</a>
          <a href="/about/">About</a>
          <a href="/contact/" class="active">Contact</a>
        </div>
      </nav>
      <button id="themeBtn" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="wrap content">
    <h1>Get in Touch</h1>
    <p>Questions, ideas, or bugs? Reach us here:</p>
    <ul>
      <li>Email: <a href="mailto:contact@neurosummarizer.online">contact@neurosummarizer.online</a></li>
      <li>GitHub: <a target="_blank" href="https://github.com/ivanslavinskyi/neurosummarizer">Project&nbsp;Repo</a></li>
      <li>Maintainer: Ivan Slavinskyi</li>
    </ul>
  </main>

  <footer>© 2026 NeuroSummarizer · Built with ❤️ and AI</footer>

  <script>
    const themeBtn = document.getElementById('themeBtn');
    const setT = t => { document.documentElement.dataset.theme = t; themeBtn.textContent = t === 'dark' ? '☀️' : '🌙'; localStorage.theme = t; };
    themeBtn.onclick = () => setT(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    setT(localStorage.theme || 'light');
    document.getElementById('menuBtn').onclick = () => document.getElementById('links').classList.toggle('open');
  </script>
</body>
</html>
